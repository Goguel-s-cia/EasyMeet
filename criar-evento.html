<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Evento - EasyMeet</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <a href="grupo-menu.html" class="back-btn">← Voltar</a>

    <div class="header">
      <h1>Novo evento</h1>
      <p>Desenvolvimento Web</p>
    </div>

    <form>
      <div class="form-group">
        <label for="eventTitle">Título do evento</label>
        <input type="text" id="eventTitle" placeholder="Ex: Workshop de JavaScript" required>
      </div>

      <div class="form-group">
        <label for="eventDescription">Descrição</label>
        <textarea id="eventDescription" placeholder="Descreva o evento..." required></textarea>
      </div>

      <div class="form-group">
        <label for="eventDate">Data</label>
        <input type="date" id="eventDate" required>
      </div>

      <div class="form-group">
        <label for="eventTime">Hora</label>
        <input type="time" id="eventTime" required>
      </div>

      <button type="submit" class="btn btn-success btn-block" style="cursor: pointer;">
        Criar evento
      </button>
    </form>
  </div>
</body>
</html>
